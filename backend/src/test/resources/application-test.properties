spring.datasource.url=jdbc:h2:mem:erdv_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

spring.mail.host=localhost
spring.mail.port=25

jwt.secret=test-jwt-secret-minimum-32-characters-long-for-hs256
jwt.expiration=3600000
jwt.refresh-expiration=86400000

app.frontend.base-url=http://localhost:3001
app.seed-demo-users=false

logging.level.com.erdv=INFO
logging.level.org.springframework.security=WARN
