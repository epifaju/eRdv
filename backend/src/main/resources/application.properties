# Profil par défaut : dev (local). Production : SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.application.name=erdv-api

server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.main.allow-circular-references=true

# JWT (obligatoire en prod : variable JWT_SECRET — au moins 32 caractères pour HS256)
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Actuator (santé pour orchestration / load balancer)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.export.prometheus.enabled=true

# OpenAPI / Swagger UI (activé en dev par défaut)
app.openapi.enabled=${APP_OPENAPI_ENABLED:false}
springdoc.swagger-ui.path=/swagger-ui.html

# Rate limiting auth (POST login, register, forgot-password)
app.auth.rate-limit.enabled=${APP_AUTH_RATE_LIMIT_ENABLED:true}
app.auth.rate-limit.max-requests=${APP_AUTH_RATE_LIMIT_MAX:20}
app.auth.rate-limit.window-seconds=${APP_AUTH_RATE_LIMIT_WINDOW:60}

# Purge des refresh tokens expirés ou révoqués (cron : tous les jours à 3h par défaut)
app.auth.refresh-token-purge.enabled=${APP_AUTH_REFRESH_TOKEN_PURGE_ENABLED:true}
app.auth.refresh-token-purge.cron=${APP_AUTH_REFRESH_TOKEN_PURGE_CRON:0 0 3 * * *}

# CORS : motifs séparés par des virgules (surcharge : variable APP_CORS_ALLOWED_ORIGIN_PATTERNS)
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

# URL du front (liens e-mail mot de passe oublié)
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:3001}

# Génération automatique des créneaux (horizon en jours)
app.creneaux.horizon-jours=${APP_CRENEAUX_HORIZON_JOURS:28}

# E-mails transactionnels
app.mail.from=${APP_MAIL_FROM:noreply@erdv.local}

# Rappels automatiques J-1 et H-2 (cron : toutes les 15 min par défaut)
app.reminders.enabled=${APP_REMINDERS_ENABLED:true}
app.reminders.cron=${APP_REMINDERS_CRON:0 */15 * * * *}

# Politique d'annulation client (heures minimum avant le RDV)
app.rdv.delai-annulation-heures=${APP_RDV_DELAI_ANNULATION_HEURES:24}

# Paiement en ligne (Stripe) — désactivé par défaut
app.payment.enabled=${APP_PAYMENT_ENABLED:false}
app.payment.stripe-secret-key=${STRIPE_SECRET_KEY:}
app.payment.stripe-publishable-key=${STRIPE_PUBLISHABLE_KEY:}
app.payment.stripe-webhook-secret=${STRIPE_WEBHOOK_SECRET:}
