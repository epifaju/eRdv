# Profil par dÃĐfaut : dev (local). Production : SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.application.name=erdv-api

server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.main.allow-circular-references=true

# JWT (obligatoire en prod : variable JWT_SECRET â au moins 32 caractÃĻres pour HS256)
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Actuator (santÃĐ pour orchestration / load balancer)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.export.prometheus.enabled=true

# OpenAPI / Swagger UI (activÃĐ en dev par dÃĐfaut)
app.openapi.enabled=${APP_OPENAPI_ENABLED:false}
springdoc.swagger-ui.path=/swagger-ui.html

# Rate limiting auth (POST login, register, forgot-password)
app.auth.rate-limit.enabled=${APP_AUTH_RATE_LIMIT_ENABLED:true}
app.auth.rate-limit.max-requests=${APP_AUTH_RATE_LIMIT_MAX:20}
app.auth.rate-limit.window-seconds=${APP_AUTH_RATE_LIMIT_WINDOW:60}

# Purge des refresh tokens expirÃĐs ou rÃĐvoquÃĐs (cron : tous les jours Ã  3h par dÃĐfaut)
app.auth.refresh-token-purge.enabled=${APP_AUTH_REFRESH_TOKEN_PURGE_ENABLED:true}
app.auth.refresh-token-purge.cron=${APP_AUTH_REFRESH_TOKEN_PURGE_CRON:0 0 3 * * *}

# CORS : motifs sÃĐparÃĐs par des virgules (surcharge : variable APP_CORS_ALLOWED_ORIGIN_PATTERNS)
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

# URL du front (liens e-mail mot de passe oubliÃĐ)
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:3001}

# GÃĐnÃĐration automatique des crÃĐneaux (horizon en jours)
app.creneaux.horizon-jours=${APP_CRENEAUX_HORIZON_JOURS:28}

# E-mails transactionnels
app.mail.from=${APP_MAIL_FROM:noreply@erdv.local}

# Rappels automatiques J-1 et H-2 (cron : toutes les 15 min par dÃĐfaut)
app.reminders.enabled=${APP_REMINDERS_ENABLED:true}
app.reminders.cron=${APP_REMINDERS_CRON:0 */15 * * * *}

# Politique d'annulation client (heures minimum avant le RDV)
app.rdv.delai-annulation-heures=${APP_RDV_DELAI_ANNULATION_HEURES:24}

# Paiement en ligne (Stripe) â dÃĐsactivÃĐ par dÃĐfaut
app.payment.enabled=${APP_PAYMENT_ENABLED:false}
app.payment.stripe-secret-key=${STRIPE_SECRET_KEY:}
app.payment.stripe-publishable-key=${STRIPE_PUBLISHABLE_KEY:}
app.payment.stripe-webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# SMS rappels RDV (Twilio) â dÃĐsactivÃĐ par dÃĐfaut
app.sms.enabled=${APP_SMS_ENABLED:false}
app.sms.twilio-account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio-auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.twilio-from-number=${TWILIO_FROM_NUMBER:}
