# Développement local — données conservées entre redémarrages (Hibernate update)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5436/erdv_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.flyway.enabled=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Secret de dev uniquement (ne jamais utiliser en prod)
jwt.secret=${JWT_SECRET:dev-jwt-secret-change-me-minimum-32-chars-for-hs256-required}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.com.erdv=DEBUG
logging.level.org.springframework.security=DEBUG

# Comptes admin@erdv.com / user@erdv.com et données de démo
app.seed-demo-users=true
