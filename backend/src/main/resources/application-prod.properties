# Production — secrets uniquement via variables d'environnement (voir env.example)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.h2.console.enabled=false

jwt.secret=${JWT_SECRET}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.com.erdv=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN

# true = créer comptes / prestataires / créneaux de démo au démarrage (Docker local). false en prod réelle.
app.seed-demo-users=${APP_SEED_DEMO_USERS:false}

# Swagger désactivé en production (surcharge possible pour Docker local)
app.openapi.enabled=${APP_OPENAPI_ENABLED:false}
